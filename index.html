<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Hệ thống Bộ Lọc & Cấp Coupon Online</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --success-color: #28a745;
            --error-color: #dc3545;
            --bg-color: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 15px;
            background-color: var(--bg-color);
            color: #333;
            display: flex; justify-content: center;
        }
        .container {
            width: 100%; max-width: 500px;
            background: #fff; padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center; color: var(--primary-color);
            margin-top: 0; margin-bottom: 5px; font-size: 20px;
        }
        .nav-admin {
            text-align: right; margin-bottom: 20px;
        }
        .nav-admin a {
            color: var(--primary-color); text-decoration: none; font-size: 14px; cursor: pointer; font-weight: bold;
        }
        .card {
            border: 1px solid #e0e0e0; border-radius: 8px;
            padding: 15px; margin-bottom: 15px;
            background: #fff; position: relative;
        }
        .card-title {
            font-weight: bold; font-size: 15px; margin-bottom: 12px; color: #444;
        }
        .status-badge {
            position: absolute; top: 15px; right: 15px; font-size: 12px; font-weight: bold;
        }
        .status-loading { color: #666; }
        .status-success { color: var(--success-color); }
        .status-error { color: var(--error-color); }

        input[type="text"], input[type="file"] {
            width: 100%; padding: 10px;
            border: 1px solid #ccc; border-radius: 6px;
            box-sizing: border-box; font-size: 14px;
        }
        .btn-block {
            width: 100%; padding: 12px; margin-top: 10px;
            background-color: var(--success-color); color: white;
            border: none; border-radius: 6px; font-weight: bold;
            font-size: 15px; cursor: pointer;
        }
        .btn-block:hover { opacity: 0.9; }

        .coupon-item {
            border: 1px dashed var(--primary-color);
            background-color: #f1f7fe;
            padding: 12px; border-radius: 8px; margin-top: 10px;
        }
        .coupon-item p { margin: 0 0 8px 0; font-size: 14px; }
        .coupon-action-row {
            display: flex; justify-content: space-between; align-items: center;
        }
        .coupon-code {
            font-family: "Courier New", Courier, monospace;
            font-weight: bold; font-size: 18px; color: #333;
        }
        .btn-copy {
            background-color: var(--success-color); color: white;
            border: none; padding: 6px 12px; border-radius: 4px;
            font-weight: bold; cursor: pointer; font-size: 13px;
        }
        .alert-info {
            padding: 12px; background-color: #fff3cd; color: #856404;
            border-radius: 6px; font-size: 14px; text-align: center; margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Hệ thống Bộ Lọc & Cấp<br>Coupon Online</h2>
    
    <div class="nav-admin">
        <a onclick="toggleAdminPanel()">Vùng Admin</a>
    </div>

    <div id="adminPanel" class="card" style="display: none; background-color: #fdfffe; border-color: var(--success-color);">
        <div class="card-title" style="color: var(--success-color);">1. Cập Nhật Cơ Sở Dữ Liệu Đồng Bộ Toàn Hệ Thống</div>
        <p style="font-size: 13px; margin: -5px 0 10px 0; color: #666;">Chọn File Excel mới để cập nhật lên đám mây:</p>
        <input type="file" id="excelFileInput" accept=".xlsx">
        <button class="btn-block" onclick="uploadNewExcel()">Bước 2: Phát Hành Lên Hệ Thống Đám Mây</button>
    </div>

    <div class="card">
        <div class="card-title">2. Tra Cứu & Lấy Coupon Nhân Viên</div>
        <span id="cloudStatus" class="status-badge status-loading">Đang kết nối...</span>
        
        <label for="searchKey" style="font-size: 13px; color: #666; display: block; margin-bottom: 5px;">Nhập tên Sản phẩm hoặc mã cần lọc:</label>
        <input type="text" id="searchKey" placeholder="Gõ tên hoặc từ khóa sản phẩm để tìm kiếm..." oninput="searchCoupon()">

        <div style="margin-top: 15px;">
            <label style="font-weight: bold; font-size: 14px; color: #444;">Danh sách Coupon khả dụng:</label>
            <div id="listStatus" style="font-size: 12px; color: #888; margin-top: 2px;">Đang tải bộ dữ liệu...</div>
            
            <div id="couponResultBox"></div>

            <div id="cloudEmptyNotice" class="alert-info" style="margin-top: 10px; display: none;"></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<script>
    // ==================== [CẤU HÌNH THÔNG SỐ TẠI ĐÂY] ====================
    const GH_USER = "dmxbh5277";         // Tài khoản GitHub của bạn
    const GH_REPO = "coupon-filter";       // Tên Kho lưu trữ (Đã chuyển Private)

    // BÊN DƯỚI LÀ NƠI DÁN TOKEN MỚI TINH (GIỮ NGUYÊN CHUỖI THÔ BẮT ĐẦU BẰNG GHP_):
    const GITHUB_TOKEN = "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";   

    const ADMIN_PASSWORD = "123";        // Mật khẩu mở phân hệ Admin trên web
    // ====================================================================

    let couponData = [];

    // Tự động kích hoạt lấy file Excel trên đám mây khi tải xong trang web
    window.addEventListener('DOMContentLoaded', () => {
        fetchDataFromGitHub();
    });

    async function fetchDataFromGitHub() {
        const statusEl = document.getElementById('cloudStatus');
        const listStatusEl = document.getElementById('listStatus');
        const cloudEmptyNotice = document.getElementById('cloudEmptyNotice');
        
        if(statusEl) { statusEl.className = 'status-loading'; statusEl.innerText = 'Đang kết nối đám mây...'; }
        if(listStatusEl) listStatusEl.innerText = 'Hệ thống đang tải dữ liệu gốc từ máy chủ...';

        const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/COUPONGVGS.xlsx`;

        try {
            const response = await fetch(url, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN.trim()}` },
                cache: 'no-store'
            });

            if (!response.ok) throw new Error('Không tìm thấy file hoặc sai cấu hình bảo mật.');

            const data = await response.json();
            const binaryString = atob(data.content);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }
            
            const workbook = XLSX.read(bytes.buffer, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            couponData = XLSX.utils.sheet_to_json(worksheet);

            if(statusEl) { statusEl.className = 'status-success'; statusEl.innerText = 'Kết nối thành công!'; }
            if(listStatusEl) listStatusEl.innerText = `Đã nạp trực tuyến (${couponData.length} dòng).`;
            
            if(cloudEmptyNotice) {
                cloudEmptyNotice.style.display = couponData.length > 0 ? 'none' : 'block';
                cloudEmptyNotice.innerHTML = 'Đám mây hiện tại trống. Vui lòng nhấn nút "Vùng Admin" để nạp file Excel lần đầu tiên!';
            }
        } catch (error) {
            console.error(error);
            if(statusEl) { statusEl.className = 'status-error'; statusEl.innerText = 'Lỗi kết nối'; }
            if(listStatusEl) listStatusEl.innerHTML = '<span style="color:red">Lỗi: Kết nối đám mây không thành công. Hãy kiểm tra lại TOKEN điền trong code và trạng thái Private của Repo!</span>';
        }
    }

    // Bộ lọc dữ liệu tìm kiếm
    function searchCoupon() {
        const keyword = document.getElementById('searchKey').value.trim().toLowerCase();
        const resultBox = document.getElementById('couponResultBox');
        
        if (!keyword) {
            resultBox.innerHTML = '';
            return;
        }

        if (couponData.length === 0) {
            resultBox.innerHTML = '<div class="alert-info">Không có dữ liệu trên đám mây để tra cứu.</div>';
            return;
        }

        const matches = couponData.filter(item => {
            const itemCode = String(item['Mã'] || item['Model'] || item['Mã sản phẩm'] || '').toLowerCase();
            const itemName = String(item['Tên sản phẩm'] || item['Sản phẩm'] || item['Tên'] || '').toLowerCase();
            return itemCode.includes(keyword) || itemName.includes(keyword);
        });

        if (matches.length === 0) {
            resultBox.innerHTML = '<div class="alert-info">Không tìm thấy sản phẩm nào trùng khớp.</div>';
            return;
        }

        let html = '';
        matches.forEach((item) => {
            const name = item['Tên sản phẩm'] || item['Sản phẩm'] || item['Model'] || 'Sản phẩm';
            const coupon = item['Mã Coupon'] || item['Coupon'] || item['Mã'] || 'Trống';
            const globalIndex = couponData.indexOf(item);
            
            html += `
                <div class="coupon-item">
                    <p>📦 <strong>Sản phẩm:</strong> <span style="color:#1a73e8">${name}</span></p>
                    <div class="coupon-action-row">
                        <span class="coupon-code">${coupon}</span>
                        <button class="btn-copy" onclick="copyAndRemoveCoupon('${coupon}', ${globalIndex})">Copy & Xóa</button>
                    </div>
                </div>
            `;
        });
        resultBox.innerHTML = html;
    }

    // Sao chép mã và tự động cập nhật bản ghi lên đám mây xóa mã vừa rút
    async function copyAndRemoveCoupon(couponCode, globalIndex) {
        try {
            await navigator.clipboard.writeText(couponCode);
            alert(`Đã copy mã: ${couponCode}\nHệ thống đang tiến hành xóa mã này trên đám mây...`);
        } catch (err) {
            alert('Trình duyệt chặn quyền truy cập clipboard, vui lòng bôi đen để sao chép tay.');
        }

        couponData.splice(globalIndex, 1);
        await syncDataToGitHub();
    }

    // Đóng gói mảng JSON thành file nhị phân Excel đẩy ngược lên API GitHub
    async function syncDataToGitHub() {
        const url = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/COUPONGVGS.xlsx`;

        try {
            const getRes = await fetch(url, {
                headers: { 'Authorization': `token ${GITHUB_TOKEN.trim()}` },
                cache: 'no-store'
            });
            if (!getRes.ok) throw new Error('Không truy xuất được mã SHA file cũ.');
            const fileData = await getRes.json();
            const currentSha = fileData.sha;

            const newWorksheet = XLSX.utils.json_to_sheet(couponData);
            const newWorkbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWorkbook, newWorksheet, "Sheet1");
            const wbout = XLSX.write(newWorkbook, { bookType: 'xlsx', type: 'binary' });

            function s2ab(s) {
                const buf = new ArrayBuffer(s.length);
                const view = new Uint8Array(buf);
                for (let i=0; i<s.length; i++) view[i] = s.charCodeAt(i) & 0xFF;
                return buf;
            }
            
            const base64Content = btoa(
                String.fromCharCode.apply(null, new Uint8Array(s2ab(wbout)))
            );

            const putRes = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${GITHUB_TOKEN.trim()}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Hệ thống tự động cập nhật lại file excel sau khi rút mã",
                    content: base64Content,
                    sha: currentSha
                })
            });

            if (putRes.ok) {
                alert("✓ ĐỒNG BỘ THÀNH CÔNG! Cơ sở dữ liệu đám mây đã được cập nhật.");
                fetchDataFromGitHub();
                document.getElementById('searchKey').value = '';
                document.getElementById('couponResultBox').innerHTML = '';
            } else {
                const errDetail = await putRes.json();
                alert("Đồng bộ thất bại! Mã lỗi máy chủ công bố: " + errDetail.message);
            }
        } catch (error) {
            console.error(error);
            alert("Lỗi đồng bộ: Không thể lưu file đè lên đám mây. Kiểm tra lại quyền hạn Token.");
        }
    }

    // Phân hệ nạp dữ liệu từ máy tính của quản trị viên
    async function uploadNewExcel() {
        const fileInput = document.getElementById('excelFileInput');
        if (!fileInput.files || fileInput.files.length === 0) {
            alert('Vui lòng chọn file Excel dạng đuôi mở rộng .xlsx trước!');
            return;
        }

        const file = fileInput.files[0];
        const reader = new FileReader();

        reader.onload = async function (e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheetName];
                
                couponData = XLSX.utils.sheet_to_json(worksheet);

                alert(`Đọc file Excel thành công (${couponData.length} dòng). Đang tiến hành đồng bộ dữ liệu...`);
                await syncDataToGitHub();
            } catch (err) {
                alert("Cấu trúc file Excel bị lỗi, không thể chuyển đổi sang chuỗi dữ liệu đám mây.");
            }
        };

        reader.readAsArrayBuffer(file);
    }

    // Xác thực mở bảng điều khiển quản lý của Admin
    function toggleAdminPanel() {
        const password = prompt("Nhập mật khẩu quyền Quản trị viên:");
        if (password === ADMIN_PASSWORD) {
            const panel = document.getElementById('adminPanel');
            if(panel) {
                panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
            }
        } else {
            alert("Mật khẩu nhập chưa đúng!");
        }
    }
</script>
</body>
</html>
